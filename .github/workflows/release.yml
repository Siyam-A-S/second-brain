name: Release Second Brain

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: second-brain-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  windows-release:
    name: Build and publish Windows zip
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows portable release
        run: npm run package:win

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = node -p "require('./package.json').version"
          $asset = "release/Second-Brain-$version-latest-win-unpacked.zip"
          $title = "Second Brain $version"

          if (-not (Test-Path $asset)) {
            throw "Expected release asset was not created: $asset"
          }

          if ($env:GITHUB_REF_TYPE -eq "tag") {
            $tag = $env:GITHUB_REF_NAME
          } else {
            $tag = "v$version"
          }

          if ($tag -ne "v$version") {
            throw "Tag $tag does not match package version $version. Expected v$version."
          }

          gh release view $tag --repo $env:GITHUB_REPOSITORY 2>$null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $asset --clobber --repo $env:GITHUB_REPOSITORY
            gh release edit $tag --title $title --repo $env:GITHUB_REPOSITORY
          } else {
            gh release create $tag $asset --title $title --generate-notes --repo $env:GITHUB_REPOSITORY
          }

          gh release view $tag --json url --jq .url --repo $env:GITHUB_REPOSITORY
