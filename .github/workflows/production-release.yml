name: Production Release Second Brain

on:
  push:
    tags:
      - "prod-v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: second-brain-production-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  windows-production:
    name: Build and publish Windows production installer
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Wine for Windows packaging
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y wine64 wine32

      - name: Build Windows production installer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run package:prod:win:installer

      - name: Publish production release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME}"
          if [ "$GITHUB_REF_TYPE" != "tag" ]; then
            TAG="prod-v$VERSION"
          fi
          TITLE="Second Brain $VERSION Production"
          SOURCE="release/Second Brain-Setup-$VERSION.exe"
          ASSET="release/Second-Brain-Setup-$VERSION-prod.exe"

          if [ "$TAG" != "prod-v$VERSION" ]; then
            echo "Tag $TAG does not match package version $VERSION. Expected prod-v$VERSION."
            exit 1
          fi
          if ! [ -f "$SOURCE" ]; then
            echo "Expected production installer was not created: $SOURCE"
            find release -maxdepth 2 -type f -print || true
            exit 1
          fi

          mv "$SOURCE" "$ASSET"
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh release create "$TAG" --title "$TITLE" --generate-notes --repo "$GITHUB_REPOSITORY"
          gh release upload "$TAG" "$ASSET" --clobber --repo "$GITHUB_REPOSITORY"
          gh release edit "$TAG" --title "$TITLE" --repo "$GITHUB_REPOSITORY"

  macos-production:
    name: Build and publish macOS arm64 production DMG
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS production DMG
        run: npm run package:prod:mac:dmg

      - name: Publish production release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME}"
          if [ "$GITHUB_REF_TYPE" != "tag" ]; then
            TAG="prod-v$VERSION"
          fi
          TITLE="Second Brain $VERSION Production"
          SOURCE="release/Second Brain-$VERSION-mac-arm64.dmg"
          ASSET="release/Second-Brain-$VERSION-prod-mac-arm64.dmg"
          RUNTIME_SCRIPT="scripts/production-runtime/install-second-brain-runtime.command"

          if [ "$TAG" != "prod-v$VERSION" ]; then
            echo "Tag $TAG does not match package version $VERSION. Expected prod-v$VERSION."
            exit 1
          fi
          if ! [ -f "$SOURCE" ]; then
            echo "Expected production DMG was not created: $SOURCE"
            find release -maxdepth 2 -type f -print || true
            exit 1
          fi

          mv "$SOURCE" "$ASSET"
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh release create "$TAG" --title "$TITLE" --generate-notes --repo "$GITHUB_REPOSITORY"
          gh release upload "$TAG" "$ASSET" "$RUNTIME_SCRIPT" --clobber --repo "$GITHUB_REPOSITORY"
          gh release edit "$TAG" --title "$TITLE" --repo "$GITHUB_REPOSITORY"
