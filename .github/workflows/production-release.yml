name: Production Release Second Brain

on:
  push:
    tags:
      - "prod-v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: second-brain-production-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  windows-runtime:
    name: Prepare Windows bundled runtime
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Prepare production runtime
        run: node scripts/prepare-production-runtime.cjs --platform win32 --arch x64

      - name: Upload Windows runtime
        uses: actions/upload-artifact@v4
        with:
          name: production-runtime-win32-x64
          path: resources/production-runtime/win32-x64

  windows-production:
    name: Build and publish Windows production installer
    runs-on: ubuntu-latest
    needs: windows-runtime

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download Windows bundled runtime
        uses: actions/download-artifact@v4
        with:
          name: production-runtime-win32-x64
          path: resources/production-runtime/win32-x64

      - name: Install Wine for Windows packaging
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y wine64 wine32

      - name: Build Windows production installer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          SECOND_BRAIN_SUPABASE_URL: ${{ vars.SECOND_BRAIN_SUPABASE_URL }}
          SECOND_BRAIN_SUPABASE_ANON_KEY: ${{ vars.SECOND_BRAIN_SUPABASE_ANON_KEY }}
          SECOND_BRAIN_WEBSITE_URL: https://www.downloadsecondbrain.com
          SECOND_BRAIN_PROXY_URL: https://graphify-proxy-724616525781.us-central1.run.app
        run: npm run package:prod:win:installer

      - name: Publish production release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME}"
          if [ "$GITHUB_REF_TYPE" != "tag" ]; then
            TAG="prod-v$VERSION"
          fi
          TITLE="Second Brain $VERSION Production"
          SOURCE="release/Second Brain-Setup-$VERSION.exe"
          ASSET="release/Second-Brain-Setup-$VERSION-prod.exe"

          if [ "$TAG" != "prod-v$VERSION" ]; then
            echo "Tag $TAG does not match package version $VERSION. Expected prod-v$VERSION."
            exit 1
          fi
          if ! [ -f "$SOURCE" ]; then
            echo "Expected production installer was not created: $SOURCE"
            find release -maxdepth 2 -type f -print || true
            exit 1
          fi

          mv "$SOURCE" "$ASSET"
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh release create "$TAG" --title "$TITLE" --generate-notes --repo "$GITHUB_REPOSITORY"
          gh release upload "$TAG" "$ASSET" --clobber --repo "$GITHUB_REPOSITORY"
          gh release edit "$TAG" --title "$TITLE" --repo "$GITHUB_REPOSITORY"

  macos-production:
    name: Build and publish macOS arm64 production DMG
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Inspect signing identity
        env:
          CSC_LINK: ${{ secrets.MAC_CERTS_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
        shell: bash
        run: |
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/inspect-signing.keychain-db"
          echo "$CSC_LINK" | base64 --decode > "$CERT_PATH"
          security create-keychain -p temp "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$CSC_KEY_PASSWORD" -T /usr/bin/codesign
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          rm -f "$CERT_PATH"
          security delete-keychain "$KEYCHAIN_PATH" || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Prepare macOS bundled runtime
        run: node scripts/prepare-production-runtime.cjs --platform darwin --arch arm64

      - name: Assert macOS notarization secrets
        shell: bash
        env:
          CSC_LINK: ${{ secrets.MAC_CERTS_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          test -n "$CSC_LINK" || (echo "MAC_CERTS_P12_BASE64 is missing" && exit 1)
          test -n "$CSC_KEY_PASSWORD" || (echo "MAC_CERTS_PASSWORD is missing" && exit 1)
          test -n "$APPLE_ID" || (echo "APPLE_ID is missing" && exit 1)
          test -n "$APPLE_APP_SPECIFIC_PASSWORD" || (echo "APPLE_APP_SPECIFIC_PASSWORD is missing" && exit 1)
          test -n "$APPLE_TEAM_ID" || (echo "APPLE_TEAM_ID is missing" && exit 1)

      - name: Build macOS production DMG
        env:
          DEBUG: electron-builder,electron-notarize*,@electron/notarize*
          CSC_LINK: ${{ secrets.MAC_CERTS_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          SECOND_BRAIN_SUPABASE_URL: ${{ vars.SECOND_BRAIN_SUPABASE_URL }}
          SECOND_BRAIN_SUPABASE_ANON_KEY: ${{ vars.SECOND_BRAIN_SUPABASE_ANON_KEY }}
          SECOND_BRAIN_WEBSITE_URL: https://www.downloadsecondbrain.com
          SECOND_BRAIN_PROXY_URL: https://graphify-proxy-724616525781.us-central1.run.app
        run: npm run package:prod:mac:dmg

      - name: Manual notarytool test
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          DMG_PATH="release/Second Brain-$VERSION-mac-arm64.dmg"

          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait \
            --output-format json | tee /tmp/notary-result.json

          SUBMISSION_ID=$(node -p "require('/tmp/notary-result.json').id")
          echo "Submission ID: $SUBMISSION_ID"

          xcrun notarytool log "$SUBMISSION_ID" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD"

          xcrun stapler staple "$DMG_PATH"

      - name: Verify macOS signing and notarization
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          APP_PATH="release/mac-arm64/Second Brain.app"
          DMG_PATH="release/Second Brain-$VERSION-mac-arm64.dmg"

          test -d "$APP_PATH" || (echo "Expected app bundle was not created: $APP_PATH" && find release -maxdepth 3 -print && exit 1)
          test -f "$DMG_PATH" || (echo "Expected DMG was not created: $DMG_PATH" && find release -maxdepth 3 -print && exit 1)
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          xcrun stapler validate "$DMG_PATH"
          spctl -a -t open --context context:primary-signature -v "$DMG_PATH"
          spctl -a -vvv -t execute "$APP_PATH"

      - name: Publish production release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME}"
          if [ "$GITHUB_REF_TYPE" != "tag" ]; then
            TAG="prod-v$VERSION"
          fi
          TITLE="Second Brain $VERSION Production"
          SOURCE="release/Second Brain-$VERSION-mac-arm64.dmg"
          ASSET="release/Second-Brain-$VERSION-prod-mac-arm64.dmg"

          if [ "$TAG" != "prod-v$VERSION" ]; then
            echo "Tag $TAG does not match package version $VERSION. Expected prod-v$VERSION."
            exit 1
          fi
          if ! [ -f "$SOURCE" ]; then
            echo "Expected production DMG was not created: $SOURCE"
            find release -maxdepth 2 -type f -print || true
            exit 1
          fi

          mv "$SOURCE" "$ASSET"
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh release create "$TAG" --title "$TITLE" --generate-notes --repo "$GITHUB_REPOSITORY"
          gh release upload "$TAG" "$ASSET" --clobber --repo "$GITHUB_REPOSITORY"
          gh release edit "$TAG" --title "$TITLE" --repo "$GITHUB_REPOSITORY"
