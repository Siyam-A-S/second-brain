name: Production macOS Release Second Brain

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: second-brain-production-macos-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  macos-production:
    name: Build and publish macOS arm64 production DMG
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Inspect signing identity
        env:
          CSC_LINK: ${{ secrets.MAC_CERTS_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
        shell: bash
        run: |
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/inspect-signing.keychain-db"
          echo "$CSC_LINK" | base64 --decode > "$CERT_PATH"
          security create-keychain -p temp "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$CSC_KEY_PASSWORD" -T /usr/bin/codesign
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          rm -f "$CERT_PATH"
          security delete-keychain "$KEYCHAIN_PATH" || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Prepare macOS bundled runtime
        run: node scripts/prepare-production-runtime.cjs --platform darwin --arch arm64

      - name: Assert macOS notarization secrets
        shell: bash
        env:
          CSC_LINK: ${{ secrets.MAC_CERTS_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          test -n "$CSC_LINK" || (echo "MAC_CERTS_P12_BASE64 is missing" && exit 1)
          test -n "$CSC_KEY_PASSWORD" || (echo "MAC_CERTS_PASSWORD is missing" && exit 1)
          test -n "$APPLE_ID" || (echo "APPLE_ID is missing" && exit 1)
          test -n "$APPLE_APP_SPECIFIC_PASSWORD" || (echo "APPLE_APP_SPECIFIC_PASSWORD is missing" && exit 1)
          test -n "$APPLE_TEAM_ID" || (echo "APPLE_TEAM_ID is missing" && exit 1)

      - name: Build macOS production DMG
        env:
          DEBUG: electron-builder,electron-notarize*,@electron/notarize*
          CSC_LINK: ${{ secrets.MAC_CERTS_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          SECOND_BRAIN_SUPABASE_URL: ${{ vars.SECOND_BRAIN_SUPABASE_URL }}
          SECOND_BRAIN_SUPABASE_ANON_KEY: ${{ vars.SECOND_BRAIN_SUPABASE_ANON_KEY }}
          SECOND_BRAIN_WEBSITE_URL: https://www.downloadsecondbrain.com
          SECOND_BRAIN_PROXY_URL: https://graphify-proxy-724616525781.us-central1.run.app
        run: npm run package:prod:mac:dmg


      - name: Verify macOS signing and notarization
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          APP_PATH="release/mac-arm64/Second Brain.app"
          DMG_PATH="release/Second Brain-$VERSION-mac-arm64.dmg"

          test -d "$APP_PATH" || (echo "Expected app bundle was not created: $APP_PATH" && find release -maxdepth 3 -print && exit 1)
          test -f "$DMG_PATH" || (echo "Expected DMG was not created: $DMG_PATH" && find release -maxdepth 3 -print && exit 1)
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          xcrun stapler validate "$DMG_PATH"
          spctl -a -vvv -t execute "$APP_PATH"

      - name: Publish production release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="prod-v$VERSION"
          TITLE="Second Brain $VERSION Production"
          SOURCE="release/Second Brain-$VERSION-mac-arm64.dmg"
          ASSET="release/Second-Brain-$VERSION-prod-mac-arm64.dmg"

          if ! [ -f "$SOURCE" ]; then
            echo "Expected production DMG was not created: $SOURCE"
            find release -maxdepth 2 -type f -print || true
            exit 1
          fi

          mv "$SOURCE" "$ASSET"
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh release create "$TAG" --title "$TITLE" --generate-notes --repo "$GITHUB_REPOSITORY"
          gh release upload "$TAG" "$ASSET" --clobber --repo "$GITHUB_REPOSITORY"
          gh release edit "$TAG" --title "$TITLE" --repo "$GITHUB_REPOSITORY"
