appId: com.secondbrain.desktop
productName: Second Brain

directories:
  output: release
  buildResources: build

icon: icon.png

files:
  - dist/**/*
  - package.json

extraResources:
  - from: resources/production-runtime
    to: runtime
    filter:
      - "**/*"
  - from: build/icon.png
    to: app-icon.png

asar: true

mac:
  icon: icon.icns
  category: public.app-category.productivity
  identity: null
  target:
    - target: dir
    - target: dmg
  artifactName: "${productName}-${version}-mac-${arch}.${ext}"
  hardenedRuntime: false
  gatekeeperAssess: false

win:
  icon: icon.ico
  target:
    - target: nsis
      arch:
        - x64
  artifactName: "${productName}-Setup-${version}.${ext}"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  include: build/installer.nsh

linux:
  target:
    - target: AppImage
      arch:
        - x64
  artifactName: "${productName}-${version}-linux-${arch}.${ext}"
